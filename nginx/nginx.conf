worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Request limits
    client_max_body_size 30m;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Rate limiting zones (belt-and-braces on top of app-level throttling)
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    upstream web {
        server web:3000;
        keepalive 32;
    }

    upstream api {
        server api:4000;
        keepalive 32;
    }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name vesion.dev www.vesion.dev;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # API (stricter limits on auth endpoints)
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api;
            include /etc/nginx/proxy_params_custom;
        }

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api;
            include /etc/nginx/proxy_params_custom;

            # Server-sent events (AI assistant streaming)
            proxy_buffering off;
            proxy_read_timeout 120s;
        }

        # Next.js static assets — long cache
        location /_next/static/ {
            proxy_pass http://web;
            include /etc/nginx/proxy_params_custom;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://web;
            include /etc/nginx/proxy_params_custom;
        }
    }
}
