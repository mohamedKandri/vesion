name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  lint-and-test:
    name: Lint, unit & API tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vesion
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: vesion_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vesion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vesion:ci-password@localhost:5432/vesion_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_ACCESS_SECRET: ci-access-secret-not-for-production-0000000000
      JWT_REFRESH_SECRET: ci-refresh-secret-not-for-production-000000000
      ENCRYPTION_KEY: 0f52696e67426561726572734f66546865436920546573744b65793030303030
      COOKIE_SECRET: ci-cookie-secret
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      MAIL_FROM: ci@vesion.dev
      WEB_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client & push schema
        working-directory: apps/api
        run: |
          pnpm prisma generate
          pnpm prisma db push --skip-generate

      - name: Lint
        run: pnpm lint

      - name: Unit tests (API + Web) with coverage
        run: pnpm test

      - name: API e2e tests
        working-directory: apps/api
        run: pnpm test:e2e

      - name: Build all apps
        run: pnpm build

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/api/coverage
            apps/web/coverage
          if-no-files-found: ignore

  docker:
    name: Docker build (deploy readiness)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=https://vesion.dev/api/v1
            NEXT_PUBLIC_APP_URL=https://vesion.dev
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
